<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>MindAR Multi Target</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      width: 100%;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: black;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      color: white;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <h2>Loading AR...</h2>
  </div>

  <!-- Status -->
  <div id="status">
    Detecting target...
  </div>

  <!-- AR Scene -->
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >

    <!-- Camera -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <!-- Lights -->
    <a-light type="ambient" intensity="1.5"></a-light>

    <a-light
      type="directional"
      intensity="1"
      position="0 1 1"
    ></a-light>

    <!-- TARGET 0 -->
    <a-entity mindar-image-target="targetIndex: 0">

      <a-gltf-model
        src="./model/apple.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
      >
      </a-gltf-model>

      <a-text
        value="Apple"
        position="0 0.8 0"
        align="center"
        color="white"
        scale="1 1 1"
      >
      </a-text>

    </a-entity>

    <!-- TARGET 1 -->
    <a-entity mindar-image-target="targetIndex: 1">

      <a-gltf-model
        src="./model/butterfly.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"
      >
      </a-gltf-model>

      <a-text
        value="Butterfly"
        position="0 0.8 0"
        align="center"
        color="white"
        scale="1 1 1"
      >
      </a-text>

    </a-entity>

  </a-scene>

  <script>

    const loader = document.getElementById("loader");
    const status = document.getElementById("status");
    const scene = document.querySelector("a-scene");

    // Hide loader when scene fully loaded
    scene.addEventListener("loaded", () => {

      console.log("Scene Loaded");

      setTimeout(() => {
        loader.style.display = "none";
      }, 1000);

    });

    // Target found
    scene.addEventListener("targetFound", (event) => {

      const index = event.detail.targetIndex;

      if(index === 0){
        status.innerHTML = "🍎 Apple Detected";
      }

      if(index === 1){
        status.innerHTML = "🦋 Butterfly Detected";
      }

      console.log("Target Found:", index);

    });

    // Target lost
    scene.addEventListener("targetLost", (event) => {

      status.innerHTML = "Detecting target...";

      console.log("Target Lost");

    });

    // Error handling
    window.addEventListener("error", (e) => {

      console.error(e);

      status.innerHTML = "Error Loading AR";

    });

  </script>

</body>
</html>
