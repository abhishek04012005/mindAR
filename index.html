<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>MindAR Image Tracking</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    a-scene {
      width: 100% !important;
      height: 100% !important;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>

<body>

  <div id="status">Detecting target...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; warmupCount: 8;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
    id="scene"
  >

    <!-- Lighting -->
    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" intensity="1" position="5 5 5"></a-light>

    <!-- Camera -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false">
    </a-camera>

    <!-- IMAGE TARGET -->
    <a-entity mindar-image-target="targetIndex: 0" id="target">

      <!-- CAR MODEL -->
      <a-gltf-model
        src="./car.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        id="car-model">
      </a-gltf-model>

      <!-- TEXT -->
      <a-text
        value="Hello AR"
        position="0 0 0.5"
        scale="2 2 2"
        align="center"
        color="white"
        width="4"
        anchor="center">
      </a-text>

    </a-entity>

  </a-scene>

  <script>
    let initialDistance = 0;
    let currentScale = 0.5;
    const car = document.getElementById('car-model');
    const target = document.getElementById('target');
    const statusDiv = document.getElementById('status');
    const scene = document.getElementById('scene');

    // Touch events for zoom
    document.addEventListener('touchmove', function(event) {
      if (event.touches.length === 2) {
        event.preventDefault();
        
        const touch1 = event.touches[0];
        const touch2 = event.touches[1];
        
        const distance = Math.hypot(
          touch1.clientX - touch2.clientX,
          touch1.clientY - touch2.clientY
        );
        
        if (initialDistance === 0) {
          initialDistance = distance;
        } else {
          const scale = distance / initialDistance;
          currentScale = Math.max(0.2, Math.min(3, currentScale * scale));
          car.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          initialDistance = distance;
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', function(event) {
      if (event.touches.length < 2) {
        initialDistance = 0;
      }
    });

    // Rotation with swipe
    let startX = 0;
    let startY = 0;
    let currentRotationY = 0;
    let currentRotationX = 0;

    document.addEventListener('touchstart', function(event) {
      if (event.touches.length === 1) {
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
      }
    });

    document.addEventListener('touchmove', function(event) {
      if (event.touches.length === 1) {
        const deltaX = event.touches[0].clientX - startX;
        const deltaY = event.touches[0].clientY - startY;
        
        // Swipe to rotate
        currentRotationY += deltaX * 1;
        currentRotationX += deltaY * 0.5;
        
        car.setAttribute('rotation', `${currentRotationX} ${currentRotationY} 0`);
        
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
      }
    }, { passive: true });

    // Status updates
    scene.addEventListener('targetFound', () => {
      statusDiv.textContent = '✓ Target detected!';
      statusDiv.style.background = 'rgba(0, 200, 0, 0.7)';
    });

    scene.addEventListener('targetLost', () => {
      statusDiv.textContent = 'Detecting target...';
      statusDiv.style.background = 'rgba(0, 0, 0, 0.7)';
    });
  </script>

</body>
</html>
